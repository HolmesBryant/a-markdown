<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>a-markdown Web Component</title>
	<script type="module" src="src/a-markdown.js"></script>
	<script type="module" src="extra/a-code.min.js"></script>
	<link rel="stylesheet" href="extra/styles.css">
	<link rel="stylesheet" href="extra/a-markdown.css">

	<style>
		.pre
		{ white-space: pre; }

		@media (min-width: 640px) {
			.flex360 {
				flex-basis: 47%;
			}
		}
	</style>
</head>
<body>
	<p><a href="test.html">testing...</a></p>
	<header>
		<h1>a-markdown Web Component</h1>
		<p> A component that renders Markdown formatted text as HTML </p>
		<details id="readme">
			<summary>README</summary>
			<a-markdown file="README.md"></a-markdown>
		</details>
	</header>

	<section>
		<h2>Quick Start</h2>
		<a-code highlight>
			<textarea>
				<html>
					<head>
						...
						<script type="module" src="path/to/a-markdown.min.js"></script>
					</head>

					<body>
						<a-markdown file="path/to/markdown-file.md">
						</a-markdown>
					</body>
				</html>
			</textarea>
		</a-code>

	<section id="demo">
		<h2>Demo</h2>

		<div class="card">
			<h3>Rendered Result</h3>

			<a-markdown file="sample.md" options='{"foo":"bar"}'></a-markdown>
		</div>

		<p> </p>

		<div class="flex stretch space-around">
			<div class="card flex360">
				<strong>Markdown</strong>

				<a-markdown
					nocache
					class="pre"
					file="sample.md"
					display="markdown">
				</a-markdown>
			</div>

			<div class="card flex360">
				<strong>Generated HTML</strong>
				<a-markdown
					nocache
					class="pre"
					file="sample.md"
					display="html">
				</a-markdown>
			</div>
		</div>

	</section>
</body>
</html>
